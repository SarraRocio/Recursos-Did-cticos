<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Pro - Externo</title>
    <script src="preguntas.js"></script>
    
    <style>
        :root { 
            --p: #6366f1; --bg: #f1f5f9; --text: #1e293b;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        .nav { margin-bottom: 20px; display: flex; gap: 10px; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--p); color: white; border: none; cursor: pointer; font-weight: 600; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; opacity: 0.7; }
        .quiz-stats { display: flex; justify-content: space-between; background: #f8fafc; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        #resource-container { text-align: center; margin: 15px 0; min-height: 50px; }
        .resource-preview { max-width: 100%; max-height: 200px; border-radius: 8px; }
        .opt-btn { background: white !important; color: var(--text) !important; border: 2px solid #e2e8f0 !important; text-align: left; transition: 0.2s; margin-bottom: 8px; }
        .opt-btn.wrong { border-color: var(--danger) !important; color: var(--danger) !important; background: #fef2f2 !important; }
        .traffic-light { display: flex; justify-content: center; gap: 15px; margin: 20px auto; padding: 15px; background: #333; border-radius: 50px; width: fit-content; }
        .light { width: 50px; height: 50px; border-radius: 50%; background: #555; opacity: 0.2; }
        .light.red.active { background: var(--danger); opacity: 1; box-shadow: 0 0 15px var(--danger); }
        .light.yellow.active { background: var(--warning); opacity: 1; box-shadow: 0 0 15px var(--warning); }
        .light.green.active { background: var(--success); opacity: 1; box-shadow: 0 0 15px var(--success); }
    </style>
</head>
<body>

<div class="card">
    <div class="nav" id="main-nav">
        <button onclick="showView('view-home')" style="background:#64748b">Inicio</button>
        <button onclick="showView('view-login')">Admin</button>
    </div>

    <section id="view-home">
        <h1>Mi Semáforo de Aprendizaje</h1>
        <p>Las preguntas se cargan desde un archivo externo.</p>
        <button onclick="startQuiz()" style="font-size: 1.2rem; padding: 20px;">Comenzar Examen</button>
    </section>

    <section id="view-login" class="hidden">
        <h2>Admin</h2>
        <input type="text" id="user" placeholder="admin">
        <input type="password" id="pass" placeholder="1234">
        <button onclick="login()">Entrar</button>
    </section>

    <section id="view-admin" class="hidden">
        <h3>Editor de Preguntas</h3>
        <select id="q-index" onchange="loadQuestionToEdit()"><option value="0">P1</option><option value="1">P2</option><option value="2">P3</option><option value="3">P4</option><option value="4">P5</option></select>
        <input type="text" id="q-text" placeholder="Pregunta">
        <select id="q-type"><option value="text">Texto</option><option value="image">Imagen</option><option value="audio">Audio</option></select>
        <input type="text" id="q-url" placeholder="URL Recurso">
        <input type="text" id="opt0" placeholder="Correcta">
        <input type="text" id="opt1" placeholder="Incorrecta 1">
        <input type="text" id="opt2" placeholder="Incorrecta 2">
        <button onclick="saveQuestion()" style="background:var(--success)">Guardar en este equipo</button>
        <button onclick="resetToDemo()" style="background:#64748b; margin-top: 5px;">Restaurar Demo Original</button>
    </section>

    <section id="view-quiz" class="hidden">
        <div class="quiz-stats">
            <span>Pregunta: <span id="q-current">1</span>/5</span>
            <span>⏱ <span id="timer">00:00</span></span>
        </div>
        <div style="font-size: 0.8rem; color: var(--p); text-align: right; margin-bottom: 5px;">Puntos: <span id="q-score">0.0</span></div>
        <h3 id="display-q-text"></h3>
        <div id="resource-container"></div>
        <div id="options-container"></div>
    </section>

    <section id="view-results" class="hidden">
        <h2 style="text-align:center">Resultados</h2>
        <div class="traffic-light"><div id="light-red" class="light red"></div><div id="light-yellow" class="light yellow"></div><div id="light-green" class="light green"></div></div>
        <div style="text-align:center">
            <p style="font-size:1.5rem; margin:0;">Puntaje: <span id="final-score"></span> / 5.0</p>
            <p>Tiempo: <span id="final-time"></span></p>
            <p id="result-message"></p>
        </div>
        <button onclick="location.reload()" style="background:#64748b; margin-top:20px;">Reiniciar Todo</button>
    </section>
</div>

<script>
    // CARGA DE DATOS: Prioriza LocalStorage, si no existe, usa la variable del archivo preguntas.js
    let quizData = JSON.parse(localStorage.getItem('nativoQuiz_v4')) || preguntasDemo;

    let currentStep = 0;
    let totalScore = 0;
    let currentQValue = 1.0;
    let seconds = 0;
    let timerInterval;

    function showView(viewId) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
        document.getElementById('main-nav').style.display = (viewId==='view-quiz'||viewId==='view-results') ? 'none' : 'flex';
    }

    function login() {
        if(document.getElementById('user').value==='admin' && document.getElementById('pass').value==='1234') showView('view-admin');
        else alert('Acceso denegado');
    }

    function startTimer() {
        seconds = 0; clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60); let s = seconds % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function startQuiz() {
        currentStep = 0; totalScore = 0; startTimer();
        showView('view-quiz'); renderQuestion();
    }

    function renderQuestion() {
        currentQValue = 1.0;
        const q = quizData[currentStep];
        document.getElementById('q-current').innerText = currentStep + 1;
        document.getElementById('q-score').innerText = totalScore.toFixed(1);
        document.getElementById('display-q-text').innerText = q.text;
        
        const resCont = document.getElementById('resource-container');
        resCont.innerHTML = '';
        if(q.type === 'image' && q.url) resCont.innerHTML = `<img src="${q.url}" class="resource-preview">`;
        if(q.type === 'audio' && q.url) resCont.innerHTML = `<audio controls src="${q.url}"></audio>`;

        const optCont = document.getElementById('options-container');
        optCont.innerHTML = '';
        const shuffled = [...q.options].sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            if(!opt) return;
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = opt;
            btn.onclick = (e) => checkAnswer(opt, e.target);
            optCont.appendChild(btn);
        });
    }

    function checkAnswer(selected, btnElement) {
        const correct = quizData[currentStep].correct;
        if(selected === correct) {
            totalScore += currentQValue;
            currentStep++;
            if(currentStep < 5) renderQuestion();
            else finishQuiz();
        } else {
            btnElement.disabled = true;
            btnElement.classList.add('wrong');
            currentQValue = Math.max(0.1, currentQValue - 0.4);
            document.getElementById('q-score').innerText = totalScore.toFixed(1);
        }
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        showView('view-results');
        document.getElementById('final-score').innerText = totalScore.toFixed(1);
        document.getElementById('final-time').innerText = document.getElementById('timer').innerText;
        
        document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
        if(totalScore >= 4.5) document.getElementById('light-green').classList.add('active');
        else if(totalScore >= 3.0) document.getElementById('light-yellow').classList.add('active');
        else document.getElementById('light-red').classList.add('active');
    }

    // Funciones de Admin para manejar la persistencia
    function loadQuestionToEdit() {
        const q = quizData[document.getElementById('q-index').value];
        document.getElementById('q-text').value = q.text;
        document.getElementById('q-type').value = q.type;
        document.getElementById('q-url').value = q.url;
        document.getElementById('opt0').value = q.correct;
        const others = q.options.filter(o => o !== q.correct);
        document.getElementById('opt1').value = others[0] || '';
        document.getElementById('opt2').value = others[1] || '';
    }

    function saveQuestion() {
        const idx = document.getElementById('q-index').value;
        quizData[idx] = {
            text: document.getElementById('q-text').value,
            type: document.getElementById('q-type').value,
            url: document.getElementById('q-url').value,
            options: [document.getElementById('opt0').value, document.getElementById('opt1').value, document.getElementById('opt2').value],
            correct: document.getElementById('opt0').value
        };
        localStorage.setItem('nativoQuiz_v4', JSON.stringify(quizData));
        alert('Guardado en caché del navegador');
    }

    function resetToDemo() {
        if(confirm('¿Deseas borrar tus cambios y volver a las preguntas de preguntas.js?')) {
            localStorage.removeItem('nativoQuiz_v4');
            location.reload();
        }
    }
</script>
</body>
</html>
